<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background glow radial gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#faf6f0" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Jellyfish body linear gradient (warm cream to soft gold/rose glow) -->
    <linearGradient id="rinBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f5e6d3"/>
    </linearGradient>

    <!-- Bioluminescent cyan glow gradient for tentacles -->
    <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Ambient background glow -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGlow)"/>

  <!-- TENTACLES (Back layer) -->
  <!-- Inner wavy tentacles -->
  <path d="M 216,280 C 200,340 230,400 216,450" stroke="url(#tentacleGrad)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 296,280 C 312,340 282,400 296,450" stroke="url(#tentacleGrad)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- Outer wavy tentacles -->
  <path d="M 166,270 C 140,330 180,390 160,430" stroke="url(#tentacleGrad)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 346,270 C 372,330 332,390 352,430" stroke="url(#tentacleGrad)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Center thick tentacle -->
  <path d="M 256,290 C 240,350 270,410 256,470" stroke="url(#tentacleGrad)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- JELLYFISH CAP (Main Body) -->
  <!-- Cute dome shaped head -->
  <path d="M 120,270 
           C 110,180 180,110 256,110 
           C 332,110 402,180 392,270 
           C 340,290 280,260 256,275 
           C 230,260 170,290 120,270 Z" 
        fill="url(#rinBodyGrad)" 
        filter="url(#softGlow)" />

  <!-- Inner pink/peach glow for cheeks -->
  <circle cx="170" cy="225" r="16" fill="#fca5a5" opacity="0.6" filter="blur(4px)"/>
  <circle cx="342" cy="225" r="16" fill="#fca5a5" opacity="0.6" filter="blur(4px)"/>

  <!-- EYES -->
  <!-- Left Eye -->
  <circle cx="195" cy="210" r="16" fill="#1e293b"/>
  <circle cx="189" cy="204" r="6" fill="#ffffff"/>
  
  <!-- Right Eye -->
  <circle cx="317" cy="210" r="16" fill="#1e293b"/>
  <circle cx="311" cy="210" r="6" fill="#ffffff"/>

  <!-- SMILE -->
  <path d="M 244,222 C 248,228 264,228 268,222" stroke="#1e293b" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- GRADUATION CAP (as in the hero section) -->
  <!-- Mortarboard Diamond -->
  <path d="M 256,70 L 330,95 L 256,120 L 182,95 Z" fill="#1e293b"/>
  <!-- Skull cap under diamond -->
  <path d="M 215,96 C 215,115 297,115 297,96" fill="#1e293b" stroke="#1e293b" stroke-width="2"/>
  <!-- Tassel band -->
  <path d="M 256,95 L 305,108 L 305,145" stroke="#d4a574" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Tassel fringe -->
  <polygon points="300,145 310,145 313,160 297,160" fill="#d4a574"/>

  <!-- Small floating sparkles -->
  <path d="M 120,110 L 123,120 L 133,123 L 123,126 L 120,136 L 117,126 L 107,123 L 117,120 Z" fill="#d4a574" opacity="0.7"/>
  <path d="M 380,120 L 382,127 L 389,129 L 382,131 L 380,138 L 378,131 L 371,129 L 378,127 Z" fill="#7dd3fc" opacity="0.8"/>
  <path d="M 390,320 L 391,324 L 395,325 L 391,326 L 390,330 L 389,326 L 385,325 L 389,324 Z" fill="#d4a574" opacity="0.7"/>
</svg>
